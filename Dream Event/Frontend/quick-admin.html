<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quick Admin Access | Subh Event</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .quick-access-card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      text-align: center;
      max-width: 500px;
      width: 100%;
    }

    .logo {
      font-size: 2.5rem;
      font-weight: bold;
      color: #2563eb;
      margin-bottom: 20px;
    }

    .logo span {
      color: #64748b;
    }

    h1 {
      color: #1f2937;
      margin-bottom: 15px;
      font-size: 2rem;
    }

    .credentials-box {
      background: #f8fafc;
      border: 2px solid #2563eb;
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
    }

    .credentials-box h3 {
      color: #2563eb;
      margin-bottom: 15px;
    }

    .credential-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 10px 0;
      padding: 10px;
      background: white;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
    }

    .credential-label {
      font-weight: bold;
      color: #6b7280;
    }

    .credential-value {
      color: #1f2937;
      font-family: monospace;
      background: #f1f5f9;
      padding: 5px 10px;
      border-radius: 4px;
    }

    .access-buttons {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-top: 25px;
    }

    .btn {
      padding: 15px 25px;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #1e40af);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3);
    }

    .btn-secondary {
      background: #6b7280;
      color: white;
    }

    .btn-secondary:hover {
      background: #4b5563;
    }

    .btn-success {
      background: #10b981;
      color: white;
    }

    .btn-success:hover {
      background: #059669;
    }

    .instructions {
      background: #fef3c7;
      border: 1px solid #f59e0b;
      border-radius: 8px;
      padding: 15px;
      margin: 20px 0;
      color: #92400e;
    }

    .steps {
      text-align: left;
      margin: 10px 0;
    }

    .steps li {
      margin: 8px 0;
      list-style: none;
      position: relative;
      padding-left: 25px;
    }

    .steps li:before {
      content: "✓";
      position: absolute;
      left: 0;
      color: #10b981;
      font-weight: bold;
    }

    .error-message {
      background: #fee2e2;
      border: 1px solid #ef4444;
      border-radius: 8px;
      padding: 15px;
      margin: 20px 0;
      color: #991b1b;
    }

    .success-message {
      background: #d1fae5;
      border: 1px solid #10b981;
      border-radius: 8px;
      padding: 15px;
      margin: 20px 0;
      color: #065f46;
    }
  </style>
</head>
<body>
  <div class="quick-access-card">
    <div class="logo">
      <i class="fas fa-calendar-alt"></i>
      Subh <span>Event</span>
    </div>
    
    <h1>🔐 Admin Quick Access</h1>
    <p>Simple way to access your admin dashboard</p>

    <div class="instructions">
      <strong>📝 Instructions:</strong>
      <ol class="steps">
        <li>Click "Go to Admin Login" button</li>
        <li>Enter your admin credentials</li>
        <li>Click "Sign In" to access dashboard</li>
      </ol>
    </div>

    <div class="access-buttons">
      <a href="admin-login.html" class="btn btn-primary">
        <i class="fas fa-sign-in-alt"></i>
        Go to Admin Login
      </a>
      
      <a href="index.html" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i>
        Back to Main Site
      </a>
    </div>

    <div id="messageArea"></div>
  </div>

  <script>
    // Auto login function
    async function autoLogin() {
      const messageArea = document.getElementById('messageArea');
      
      messageArea.innerHTML = `
        <div class="success-message">
          <strong>🚀 Auto Logging In...</strong><br>
          Please wait while we set up your admin session...
        </div>
      `;

      try {
        // Simulate admin login
        const response = await fetch('http://localhost:5001/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            email: 'admin@dreamevent.com',
            password: 'admin123'
          })
        });

        if (response.ok) {
          const data = await response.json();
          
          // Save admin session
          localStorage.setItem('adminToken', data.token);
          localStorage.setItem('adminUser', JSON.stringify(data.user));
          
          messageArea.innerHTML = `
            <div class="success-message">
              <strong>✅ Login Successful!</strong><br>
              Redirecting to admin dashboard...
            </div>
          `;
          
          // Redirect to admin dashboard
          setTimeout(() => {
            window.location.href = 'admin-dashboard.html';
          }, 1500);
          
        } else {
          throw new Error('Login failed');
        }
        
      } catch (error) {
        messageArea.innerHTML = `
          <div class="error-message">
            <strong>❌ Auto Login Failed</strong><br>
            Please use the manual login method above.<br>
            Error: ${error.message}
          </div>
        `;
      }
    }

    // Copy to clipboard function
    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        alert('Copied to clipboard!');
      });
    }

    // Add click handlers for credential values
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('.credential-value').forEach(element => {
        element.style.cursor = 'pointer';
        element.title = 'Click to copy';
        element.addEventListener('click', function() {
          copyToClipboard(this.textContent);
        });
      });
    });
  </script>
</body>
</html>
