<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login | Subh Event</title>
  <link rel="stylesheet" href="css/admin-login.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="admin-login-container">
    <div class="admin-login-card">
      <div class="login-header">
        <div class="logo">
          <i class="fas fa-calendar-alt"></i>
          Subh <span>Event</span>
        </div>
        <h2>Admin Login</h2>
        <p>Access your admin dashboard</p>
      </div>

      <form id="adminLoginForm" class="login-form">
        <div class="form-group">
          <label for="email">
            <i class="fas fa-envelope"></i>
            Email Address
          </label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">
            <i class="fas fa-lock"></i>
            Password
          </label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
          <button type="button" class="toggle-password" onclick="togglePassword()">
            <i class="fas fa-eye" id="toggleIcon"></i>
          </button>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="remember">
            <span class="checkmark"></span>
            Remember me
          </label>
          <a href="#" class="forgot-password">Forgot password?</a>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i>
          <span>Sign In</span>
        </button>
      </form>

      <div class="login-footer">
        <p>Don't have admin access?</p>
        <a href="index.html" class="back-to-site">
          <i class="fas fa-arrow-left"></i>
          Back to Main Site
        </a>
      </div>
    </div>

    <div class="alert" id="alertMsg"></div>
  </div>

  <script>
    const API = 'http://localhost:5001/api';

    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const toggleIcon = document.getElementById('toggleIcon');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
      } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
      }
    }

    function showAlert(message, type) {
      const alertEl = document.getElementById('alertMsg');
      alertEl.textContent = message;
      alertEl.className = `alert show ${type}`;
    }

    function hideAlert() {
      const alertEl = document.getElementById('alertMsg');
      alertEl.className = 'alert';
    }

    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;

      let valid = true;
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showAlert('Please enter a valid email address', 'error');
        valid = false;
      }

      if (!password) {
        showAlert('Please enter your password', 'error');
        valid = false;
      }

      if (!valid) return;

      const loginBtn = document.getElementById('loginBtn');
      const originalContent = loginBtn.innerHTML;
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>Signing in...</span>';

      try {
        const response = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          // Check if user is admin
          if (data.user.role !== 'admin') {
            showAlert('Access denied. This account does not have admin privileges. Please use admin@dreamevent.com', 'error');
            loginBtn.disabled = false;
            loginBtn.innerHTML = originalContent;
            return;
          }

          // Save admin session
          localStorage.setItem('adminToken', data.token);
          localStorage.setItem('adminUser', JSON.stringify(data.user));
          
          if (remember) {
            localStorage.setItem('rememberAdmin', 'true');
          }

          showAlert('Login successful! Redirecting...', 'success');
          setTimeout(() => {
            window.location.href = 'admin-dashboard.html';
          }, 1500);
        } else {
          showAlert(data.message || 'Login failed', 'error');
          loginBtn.disabled = false;
          loginBtn.innerHTML = originalContent;
        }
      } catch (error) {
        showAlert('Cannot connect to server. Please check your connection.', 'error');
        loginBtn.disabled = false;
        loginBtn.innerHTML = originalContent;
      }
    });

    // Check if admin is already logged in
    window.addEventListener('DOMContentLoaded', () => {
      const adminToken = localStorage.getItem('adminToken');
      const adminUser = localStorage.getItem('adminUser');
      
      if (adminToken && adminUser) {
        window.location.href = 'admin-dashboard.html';
      }
    });
  </script>
</body>
</html>
